services:
  - type: web
    name: streamflow-explorer
    runtime: python
    buildCommand: >-
      pip install -r app/requirements.txt &&
      pip install sphinx furo &&
      (make -C docs html || echo "Sphinx build failed, skipping docs") &&
      cd app/frontend && npm install && npm run build
    startCommand: python -m app serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
