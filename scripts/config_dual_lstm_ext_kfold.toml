# =============================================================================
# lstmhyd-ca — extreme-flow-weighted dual LSTM experiment
# Run with: python train_kfold.py config_dual_lstm_ext_kfold.toml
#
# Differences from config_dual_lstm_kfold.toml:
#   - extreme_weight_max = 5.0  (gentle MSE nudge; MSE already over-weights extremes)
#   - extreme_threshold  = 4.0  (≈p99 in normalised space)
#   - extreme_ramp       = 8.0  (max weight reached at normalised 12.0 ≈ p99.9)
#   - extreme_peak_boost = 8.0  (fast-pathway aux penalty 4.5×8=36× on extremes)
#   - log_loss_lambda    = 0.05 (full strength; preserves FLV)
# =============================================================================

[paths]
data_dir             = "../data"
climate_dir          = "../data/training/climate"
flow_dir             = "../data/training/flow"
static_basin_atlas   = "../data/training/static/Physical_Attributes_Watersheds.csv"
static_climate       = "../data/training/static/Climate_Statistics_Watersheds.csv"
static_dem           = "../data/training/static/DEM_Attributes_Watersheds.csv"
static_network       = "../data/training/static/Network_Attributes_Watersheds.csv"

[sequence]
seq_len              = 365
fast_window          = 18
info_gap             = false

[model]
model_type           = "dual"
fast_hidden_size     = 64
slow_hidden_size     = 128
single_hidden_size   = 128
static_embedding_dim = 10
static_hidden_size   = 32
dropout              = 0.20
static_dropout       = 0.10

[aux_loss]
aux_loss_weight      = 0.40
baseflow_alpha       = 0.925
aux_peak_asymmetry   = 4.5

[blended_loss]
log_loss_lambda      = 0.05   # residual low-flow sensitivity
log_loss_epsilon     = 0.001

[extreme_loss]
extreme_threshold    = 4.0    # normalised flow above which upweighting begins (≈p99)
extreme_weight_max   = 5.0    # gentle nudge; MSE already gives top 1% ~66% of gradient
extreme_ramp         = 8.0    # normalised ramp range (threshold to threshold+ramp ≈ p99.9)
extreme_peak_boost   = 8.0    # fast-pathway aux boost (eff. penalty = 4.5×8 = 36× on extremes)

[training]
batch_size           = 512
learning_rate        = 4e-4
weight_decay         = 1e-4
input_noise_std      = 0.1
warmup_epochs        = 3
num_epochs           = 80
patience             = 5
min_delta            = 0.002
num_workers          = 0
grad_clip            = 1.0
use_swa              = true
swa_lr               = 2e-4
swa_patience         = 10

[validation]
n_folds              = 5
holdout_fraction     = 0.2
seed                 = 42

[features]
dynamic_features = ["precip_mm", "tmax_c", "tmin_c"]
static_features  = [
    # --- scale / topography ---
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    "ele_p05",
    "ele_p25",
    "ele_p50",
    "ele_p75",
    "ele_p95",
    "ele_range",
    "ele_std",
    "hyp_integral",
    # --- stream network ---
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    "drain_density_km",
    "max_strahler",
    "bifurc_ratio",
    "main_chan_length_km",
    "main_chan_sinuosity",
    # --- soil / land cover ---
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "clz_cl_smj",
    "lit_cl_smj",
    # --- climate ---
    "precip_mean",
    "pet_mean",
    "aridity_index",
    "snow_fraction",
    "low_precip_dur",
]
log_transform_static = ["total_Shape_Area_km2", "ria_ha_usu", "main_chan_length_km"]
exclude_climate_statics = false
climate_static_features = [
    "precip_mean",
    "pet_mean",
    "aridity_index",
    "snow_fraction",
    "low_precip_dur",
]
use_window_snow_fraction = false

[static_feature_groups]
topography = [
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    "ele_p05",
    "ele_p25",
    "ele_p50",
    "ele_p75",
    "ele_p95",
    "ele_range",
    "ele_std",
    "hyp_integral",
]
network = [
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    "drain_density_km",
    "max_strahler",
    "bifurc_ratio",
    "main_chan_length_km",
    "main_chan_sinuosity",
]
soil_land = [
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "clz_cl_smj",
    "lit_cl_smj",
]
climate = [
    "precip_mean",
    "pet_mean",
    "aridity_index",
    "snow_fraction",
    "low_precip_dur",
]
