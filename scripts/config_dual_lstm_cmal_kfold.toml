# =============================================================================
# lstmhyd-ca — Dual-pathway LSTM with CMAL probabilistic output
# Run with: python train_kfold.py config_dual_lstm_cmal_kfold.toml
# =============================================================================

[paths]
data_dir             = "../data"
climate_zarr          = "../data/training/climate/watersheds.zarr"
flow_zarr             = "../data/training/flow.zarr"
static_basin_atlas   = "../data/training/static/watersheds/Physical_Attributes_Watersheds.csv"
static_climate       = "../data/training/static/watersheds/Climate_Statistics_Watersheds.csv"

[sequence]
seq_len              = 365
fast_window          = 35
info_gap             = false

[model]
model_type           = "dual"
fast_hidden_size     = 48
slow_hidden_size     = 96
single_hidden_size   = 128
static_embedding_dim = 10
static_hidden_size   = 32
dropout              = 0.15
static_dropout       = 0.10
output_type          = "cmal"
cmal_n_components    = 3
cmal_hidden_size     = 64
cmal_loss            = "crps"
cmal_crps_n_samples  = 50
cmal_beta_crps       = 0.0
cmal_entropy_weight  = 0.1
cmal_scale_reg_weight = 0.0

[aux_loss]
aux_loss_weight      = 0.25
baseflow_alpha       = 0.925

[blended_loss]
log_loss_lambda      = 0.0     # pure CRPS — no blended MSE
log_loss_epsilon     = 0.001

[training]
batch_size           = 512
learning_rate        = 5e-4
weight_decay         = 1e-4
input_noise_std      = 0.1
warmup_epochs        = 3
num_epochs           = 80
patience             = 5
min_delta            = 0.002
num_workers          = 0
grad_clip            = 1.0
use_swa              = true
swa_lr               = 2e-4
swa_patience         = 10

[validation]
n_folds              = 5
seed                 = 42

[features]
dynamic_features = ["precip_mm", "tmax_c", "tmin_c"]
static_features  = [
    # topo (3) — Physical CSV
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    # network (3) — Physical CSV
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    # soil/surface (5) — Physical CSV
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "clz_cl_smj",
    "lit_cl_smj",
    # climate (7) — Climate CSV
    "aridity_index",
    "snow_fraction",
    "pet_mean",
    "high_precip_freq",
    "precip_mean",
    "low_precip_dur",
    "high_precip_dur",
]
log_transform_static = ["total_Shape_Area_km2", "ria_ha_usu"]
