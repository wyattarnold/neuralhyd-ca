# =============================================================================
# lstmhyd-ca — Dual-pathway LSTM with CMAL probabilistic output
# Run with: python train_kfold.py config_dual_lstm_cmal_kfold.toml
#
# Based on config_dual_lstm_kfold.toml with:
#   - output_type = "cmal" — CMALHead on [h_slow, h_fast]
#   - Pathway heads retained for aux loss (keeps representations physical)
#   - info_gap = true — forces pathway separation without multiplicative structure
#   - cmal_loss = "crps" with β=0.5 for calibrated intervals
#   - K=5 mixture components, entropy reg on π
# =============================================================================

[paths]
data_dir             = "../data"
climate_dir          = "../data/training/climate"
flow_dir             = "../data/training/flow"
static_basin_atlas   = "../data/training/static/Physical_Attributes_Watersheds.csv"
static_climate       = "../data/training/static/Climate_Statistics_Watersheds.csv"

[sequence]
seq_len              = 365
fast_window          = 18
info_gap             = false

[model]
model_type           = "dual"
fast_hidden_size     = 64
slow_hidden_size     = 128
single_hidden_size   = 128
static_embedding_dim = 10
static_hidden_size   = 32
dropout              = 0.20
static_dropout       = 0.10
output_type          = "cmal"
cmal_n_components    = 3
cmal_hidden_size     = 64
cmal_loss            = "crps"
cmal_crps_n_samples  = 50
cmal_beta_crps       = 0.0
cmal_entropy_weight  = 0.1
cmal_scale_reg_weight = 0.0

[aux_loss]
aux_loss_weight      = 0.25
baseflow_alpha       = 0.925
aux_peak_asymmetry   = 4.5

[extreme_loss]
extreme_threshold    = 4.0    # normalised flow above which upweighting begins (≈p99)
extreme_weight_max   = 5.0    # gentle nudge on CRPS + aux for extreme events
extreme_ramp         = 8.0    # normalised ramp range (threshold to threshold+ramp ≈ p99.9)
extreme_peak_boost   = 8.0    # fast-pathway aux boost (eff. penalty = 4.5×8 = 36× on extremes)

[blended_loss]
log_loss_lambda      = 0.0     # pure CRPS — no blended MSE
log_loss_epsilon     = 0.001

[training]
batch_size           = 512
learning_rate        = 4e-4
weight_decay         = 1e-4
input_noise_std      = 0.1
warmup_epochs        = 3
num_epochs           = 80
patience             = 5
min_delta            = 0.002
num_workers          = 0
grad_clip            = 1.0
use_swa              = true
swa_lr               = 2e-4
swa_patience         = 10

[validation]
n_folds              = 5
holdout_fraction     = 0.2
seed                 = 42

[features]
dynamic_features = ["precip_mm", "tmax_c", "tmin_c"]
static_features  = [
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    "precip_mean",
    "pet_mean",
    "aridity_index",
    "snow_fraction",
    "low_precip_dur",
    "clz_cl_smj",
    "lit_cl_smj",
]
log_transform_static = ["total_Shape_Area_km2", "ria_ha_usu"]
