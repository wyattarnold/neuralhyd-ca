# =============================================================================
# lstmhyd-ca — dual-pathway LSTM (default training config)
# Run with: python train_kfold.py config_dual_lstm_kfold.toml
#
# Two architectural components are always active and not configurable:
#
# 1. Jointly-learned per-basin scale head.  A small ScaleHead on the static
#    embedding produces exp(log s_b), zero-initialised so scale = 1.0 at
#    init.  It multiplies pathway outputs so the LSTMs can produce outputs
#    in a compact range while per-basin amplitude is absorbed end-to-end
#    under the main loss.  Targets remain y / precip_mean (stable init;
#    universally computable for any basin with climate data).
#
# 2. Per-basin extreme-loss quantile thresholds.  At fold-init time, each
#    basin's p(extreme_start_quantile) and p(extreme_top_quantile) of the
#    normalised target are computed and propagated per-sample through the
#    DataLoader.  The aux-loss extreme ramp targets the top X % of *each*
#    basin's flow distribution rather than a fixed dimensionless cut-off
#    that means different things across T1 (flashy), T2 (mixed), and T3
#    (snow-dominated) basins.
# =============================================================================

[paths]
data_dir             = "../data"
climate_zarr          = "../data/training/climate/watersheds.zarr"
flow_zarr             = "../data/training/flow.zarr"
static_basin_atlas   = "../data/training/static/watersheds/Physical_Attributes_Watersheds.csv"
static_climate       = "../data/training/static/watersheds/Climate_Statistics_Watersheds.csv"

[sequence]
seq_len              = 365
fast_window          = 28
info_gap             = false

[model]
model_type           = "dual"
fast_hidden_size     = 64
slow_hidden_size     = 108
static_embedding_dim = 10
static_hidden_size   = 32
dropout              = 0.15
static_dropout       = 0.10
basin_loss_weight_exponent = 0.25

[aux_loss]
aux_loss_weight      = 0.40
baseflow_alpha       = 0.925

[blended_loss]
log_loss_lambda      = 0.05
log_loss_epsilon     = 0.001

[extreme_loss]
# Per-basin quantile thresholds.  At fold init, dataset.py computes the
# p(extreme_start_quantile) and p(extreme_top_quantile) of each basin's
# normalised target and passes them per-sample to the aux loss.  Ramp
# width = q_top − q_start per basin.
extreme_start_quantile = 0.98
extreme_top_quantile   = 0.995
extreme_peak_boost     = 30.0

[training]
batch_size           = 512
learning_rate        = 4e-4
weight_decay         = 1e-4
input_noise_std      = 0.1
warmup_epochs        = 3
num_epochs           = 80
patience             = 8
min_delta            = 0.002
num_workers          = 0
grad_clip            = 1.0
use_swa              = true
swa_lr               = 2e-4
swa_patience         = 10

[validation]
n_folds              = 5
seed                 = 42

[features]
dynamic_features = ["precip_mm", "tmax_c", "tmin_c"]
static_features  = [
    # topo (3) — Physical CSV
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    # network (3) — Physical CSV
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    # soil/surface (5) — Physical CSV
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "clz_cl_smj",
    "lit_cl_smj",
    # climate (7) — Climate CSV
    "aridity_index",
    "snow_fraction",
    "pet_mean",
    "high_precip_freq",
    "precip_mean",
    "low_precip_dur",
    "high_precip_dur",
]
log_transform_static = ["total_Shape_Area_km2", "ria_ha_usu"]
