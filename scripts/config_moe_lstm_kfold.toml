# =============================================================================
# lstmhyd-ca — MoE-τ experiment configuration
# Run with: python train_kfold.py config_moe_lstm_kfold.toml
# =============================================================================

[paths]
data_dir             = "../data"
climate_dir          = "../data/training/climate"
flow_dir             = "../data/training/flow"
static_basin_atlas   = "../data/training/static/Physical_Attributes_Watersheds.csv"
static_climate       = "../data/training/static/Climate_Statistics_Watersheds.csv"

[sequence]
seq_len              = 365

[model]
model_type           = "moe"    # Mixture-of-Experts with learnable temperature (MoE-τ)
static_embedding_dim = 10
static_hidden_size   = 32
dropout              = 0.10
static_dropout       = 0.10

[moe]
moe_n_experts          = 3       # number of LSTM experts
moe_expert_hidden_size = 64     # D_h: expert LSTM hidden size
moe_gate_hidden_size   = 32      # D_g: gating LSTM hidden size
moe_attention_dim      = 16      # D_a: attention projection dimension
moe_tau_init           = 0.25     # initial temperature (0 < τ < 1; lower = sharper gating)

[blended_loss]
log_loss_lambda      = 0.05
log_loss_epsilon     = 0.001

[training]
batch_size           = 512
learning_rate        = 4e-4
weight_decay         = 1e-4
input_noise_std      = 0.1
warmup_epochs        = 3
num_epochs           = 80
patience             = 8
min_delta            = 0.002
num_workers          = 0
grad_clip            = 1.0
use_swa              = true
swa_lr               = 2e-4
swa_patience         = 10

[validation]
n_folds              = 5
seed                 = 42

[features]
dynamic_features = ["precip_mm", "tmax_c", "tmin_c"]
static_features  = [
    # topo (3) — Physical CSV
    "total_Shape_Area_km2",
    "ele_mt_uav",
    "slp_dg_uav",
    # network (3) — Physical CSV
    "ria_ha_usu",
    "riv_tc_usu",
    "sgr_dk_sav",
    # soil/surface (5) — Physical CSV
    "for_pc_use",
    "cly_pc_uav",
    "snd_pc_uav",
    "clz_cl_smj",
    "lit_cl_smj",
    # climate (7) — Climate CSV
    "aridity_index",
    "snow_fraction",
    "pet_mean",
    "high_precip_freq",
    "precip_mean",
    "low_precip_dur",
    "high_precip_dur",
]
log_transform_static = ["total_Shape_Area_km2", "ria_ha_usu"]
