name: neuralhyd
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  # ML / numerics
  - pytorch>=2.0
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  # visualization
  - matplotlib>=3.7
  # geospatial
  - geopandas>=0.13
  - cartopy
  - xarray
  # data retrieval
  - requests
  - dataretrieval
  # utilities
  - tqdm>=4.65
  - pyarrow
  # web app
  - pip
  - pip:
      - fastapi
      - uvicorn[standard]
      - pydantic>=2.10
      - orjson>=3.9
      - optuna>=3.0
      - sphinx>=7.0
      - furo>=2024.0
